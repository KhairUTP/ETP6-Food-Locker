<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Locker - Project G-6</title>
    
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #eaf5e9 0%, #e3f2fd 100%);
            min-height: 100vh;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(0,0,0,0.05);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .logo h1 {
            margin: 0;
            color: #2e4a4d;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo p {
            margin: 0;
            font-size: 14px;
            color: #555;
            padding-left: 34px;
        }
        .team-name {
            font-size: 20px;
            font-weight: bold;
            color: #111;
        }
        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            padding: 0 20px;
        }
        .hero-text h2 {
            font-size: 36px;
            line-height: 1.2;
            color: #111;
            margin: 0;
        }
        .hero-image {
            width: 350px;
            height: 200px;
            background-color: #ccc;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .locker-section {
            text-align: center;
        }
        .locker-section h3 {
            font-size: 22px;
            margin-bottom: 20px;
        }
        .locker-container {
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        .locker-btn {
            background: linear-gradient(to bottom, #fdfdfd, #e9ecef);
            border: 1px solid #b0bec5;
            border-radius: 8px;
            width: 160px;
            height: 80px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1), inset 0 2px 0 rgba(255,255,255,0.8);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            transition: all 0.2s ease;
        }
        .locker-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.8);
        }
        .locker-btn:disabled {
            background: linear-gradient(to bottom, #cfd8dc, #b0bec5);
            border: 1px solid #90a4ae;
            color: #546e7a;
            cursor: not-allowed;
            box-shadow: none;
        }
        .badge {
            position: absolute;
            top: 5px;
            right: 10px;
            background-color: #4caf50;
            color: white;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .badge::after {
            content: '';
            width: 6px;
            height: 6px;
            background-color: #fff;
            border-radius: 50%;
            display: inline-block;
        }
        .badge.unavailable {
            background-color: #78909c;
        }
        .badge.unavailable::after {
            display: none;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .modal-content h4 {
            margin: 0 0 5px 0;
            font-size: 18px;
        }
        .modal-content p.subtitle {
            margin: 0 0 20px 0;
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }
        .pin-display {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .pin-digit {
            width: 40px;
            height: 50px;
            border: 1px solid #4a7c59;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            color: #111;
            background-color: #f9fbf9;
        }
        .modal-content p.instructions {
            font-size: 12px;
            color: #444;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .dismiss-btn {
            background-color: #4c8c54;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .dismiss-btn:hover {
            background-color: #3b6e41;
        }
        #fbStatus {
            position: fixed;
            bottom: 16px; right: 16px;
            font-size: 11px;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.9);
            border: 1px solid #ccc;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">
            <h1>🍱 Food Locker</h1>
            <p>Fresh & Hygiene</p>
        </div>
        <div class="team-name">
            Engineering Team Project G-6
        </div>
    </div>

    <div class="hero">
        <div class="hero-text">
            <h2>Your Food is Secure<br>and Fresh<br>On Your Schedule</h2>
        </div>
        <div class="hero-image">
            <img src="2026-03-11 15_34_27-WhatsApp" alt="Man at locker">
        </div>
    </div>

    <div class="locker-section">
        <h3>Available Locker</h3>
        <div class="locker-container">

            <!-- Locker A1 — status controlled by Firebase -->
            <button class="locker-btn" id="btnA1" onclick="openModal('A1')">
                <div class="badge" id="badgeA1">Available</div>
                Locker A1
            </button>

            <button class="locker-btn" disabled>
                <div class="badge unavailable">Occupied</div>
                Locker A2
            </button>

            <button class="locker-btn" disabled>
                <div class="badge unavailable">Occupied</div>
                Locker A3
            </button>

        </div>
    </div>

    <div class="modal-overlay" id="pinModal">
        <div class="modal-content">
            <h4>UNIQUE LOCKER ACCESS PIN</h4>
            <p class="subtitle">FOR LOCKER <span id="displayLockerId"></span></p>
            
            <div class="pin-display">
                <div class="pin-digit" id="digit1">0</div>
                <div class="pin-digit" id="digit2">0</div>
                <div class="pin-digit" id="digit3">0</div>
                <div class="pin-digit" id="digit4">0</div>
                <div class="pin-digit" id="digit5">0</div>
                <div class="pin-digit" id="digit6">0</div>
            </div>
            
            <p class="instructions">
                Please use this code on the keypad of Locker <span id="instructionLockerId"></span>.<br>
                Code is valid for 30 minutes.
            </p>
            
            <button class="dismiss-btn" onclick="closeModal()">DISMISS</button>
        </div>
    </div>

    <div id="fbStatus">🔴 Connecting...</div>

    <!-- ── Firebase integration ── -->
    <script type="module">
        import { initializeApp }
            from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged }
            from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue }
            from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey:            "AIzaSyAFANgyw3F5wuVdksyEwGbH33EtwH3bJlM",
            authDomain:        "etp6-food-locker.firebaseapp.com",
            databaseURL:       "https://etp6-food-locker-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId:         "etp6-food-locker",
            storageBucket:     "etp6-food-locker.firebasestorage.app",
            messagingSenderId: "567922131715",
            appId:             "1:567922131715:web:5d9e7ee27b34957fb29f36"
        };

        const fbApp = initializeApp(firebaseConfig);
        const auth  = getAuth(fbApp);
        const db    = getDatabase(fbApp);

        const fbStatus = document.getElementById('fbStatus');
        const btnA1    = document.getElementById('btnA1');
        const badgeA1  = document.getElementById('badgeA1');

        // Anonymous auth
        signInAnonymously(auth).catch(e => {
            fbStatus.textContent = "🔴 Auth error";
            console.error(e);
        });

        onAuthStateChanged(auth, user => {
            if (user) {
                fbStatus.textContent = "🟢 Firebase Connected";
                startListeners();
            } else {
                fbStatus.textContent = "🔴 Disconnected";
            }
        });

        // Listen to /lockerStatus written by ESP after item detected
        function startListeners() {
            onValue(ref(db, "/lockerStatus"), snap => {
                const status = snap.val();
                if (!status || status === "Available") {
                    btnA1.disabled      = false;
                    badgeA1.className   = "badge";
                    badgeA1.textContent = "Available";
                } else {
                    btnA1.disabled      = true;
                    badgeA1.className   = "badge unavailable";
                    badgeA1.textContent = status === "Waiting for Item" ? "In Use" : "Occupied";
                }
            });
        }

        // Generate PIN → display in modal → write to Firebase → ESP shows it on OLED
        window.openModal = function(lockerName) {
            document.getElementById('displayLockerId').innerText     = lockerName;
            document.getElementById('instructionLockerId').innerText = lockerName;

            let pin = "";
            for (let i = 1; i <= 6; i++) {
                const d = Math.floor(Math.random() * 10);
                document.getElementById('digit' + i).innerText = d;
                pin += d;
            }

            // Push PIN to Firebase — ESP picks it up via stream and displays on OLED
            set(ref(db, "/secretCode"),   pin);
            set(ref(db, "/lockerStatus"), "Occupied");

            document.getElementById('pinModal').style.display = 'flex';
        };

        window.closeModal = function() {
            document.getElementById('pinModal').style.display = 'none';
        };
    </script>

</body>
</html>
